<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI & CS Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: #333; font-size: 32px; }
        .question-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            border-left: 5px solid #667eea;
        }
        .question-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option {
            padding: 15px 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
        }
        .option:hover { background: #e8eafe; border-color: #667eea; }
        .option.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 22px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            margin-top: 20px;
        }
        .submit-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .results { display: none; }
        .score-display {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .score { font-size: 72px; color: white; font-weight: 700; }
        .score-text { color: white; font-size: 20px; margin-top: 10px; }
        .result-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .result-question { font-size: 17px; color: #333; margin-bottom: 15px; font-weight: 600; }
        .answer { margin: 8px 0; font-size: 15px; }
        .answer.correct { color: #28a745; }
        .answer.incorrect { color: #dc3545; }
        .explanation {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            color: #555;
        }
        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .badge.correct { background: #28a745; color: white; }
        .badge.incorrect { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div id="quiz-form">
            <div class="header">
                <h1>🧠 AI & Computer Science Quiz</h1>
            </div>

            <div id="questions-container"></div>

            <button class="submit-btn" onclick="submitQuiz()">Submit Quiz</button>
        </div>

        <div id="results" class="results">
            <div class="score-display">
                <div class="score" id="score">0/10</div>
                <div class="score-text" id="score-text">Loading...</div>
            </div>
            <div id="result-details"></div>
            <button class="submit-btn" onclick="restartQuiz()">Restart Quiz</button>
        </div>
    </div>

    <script>
        // Same questions as in app.py – frontend side copy
        const quizData = [
            {
                question: "Millions of people message every second, but there are no clashes. What handles this?",
                options: ["Load balancer", "Big database", "Fast CPU", "Cache only"]
            },
            {
                question: "What happens if two people book the same seat at the same millisecond?",
                options: ["Both get it", "First wins", "System crashes", "Random remove"]
            },
            {
                question: "Chatbots answer instantly for millions, yet don't slow down. What's the key?",
                options: ["One GPU", "Model caching", "Queue all", "Human help"]
            },
            {
                question: "AI models train on huge data, but stay fast. What helps most?",
                options: ["More RAM", "Distributed training", "Faster disk", "Manual sorting"]
            },
            {
                question: "Two users edit the same file at once; no corruption. How?",
                options: ["Lock file", "Nightly merge", "Delete later", "Email copy"]
            },
            {
                question: "Millions upload photos daily, yet search stays fast. Why?",
                options: ["Full scan", "Index + cache", "One server", "Manual tags"]
            },
            {
                question: "AI chatbots avoid 'hallucinations' in 2025–2026 more than before. Main reason?",
                options: ["True–False training", "Better RLHF", "More words", "Human chat"]
            },
            {
                question: "Real-time video calls for millions don't drop frames. What's critical?",
                options: ["Big buffer", "Edge streaming", "Slow encode", "One CDN"]
            },
            {
                question: "Two apps update a user's balance at once; no errors. How?",
                options: ["Async only", "ACID transaction", "Night backup", "File lock"]
            },
            {
                question: "Generative AI models scale up but stay affordable in 2024–2026. Key factor?",
                options: ["More servers", "Efficient inference", "Manual tuning", "Copy prompts"]
            }
        ];

        let answers = {};

        function loadQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            quizData.forEach((question, qIdx) => {
                const card = document.createElement('div');
                card.className = 'question-card';

                let optionsHTML = '';
                question.options.forEach((option, oIdx) => {
                    optionsHTML += `
                        <div class="option" data-question="${qIdx}" data-option="${oIdx}">
                            ${option}
                        </div>`;
                });

                card.innerHTML = `
                    <div class="question-text">${qIdx + 1}. ${question.question}</div>
                    <div class="options">${optionsHTML}</div>
                `;

                container.appendChild(card);
            });

            document.querySelectorAll('.option').forEach(option => {
                option.addEventListener('click', function () {
                    const qIdx = this.dataset.question;
                    const oIdx = this.dataset.option;

                    document.querySelectorAll('.option[data-question="' + qIdx + '"]')
                        .forEach(opt => opt.classList.remove('selected'));

                    this.classList.add('selected');
                    answers[qIdx] = parseInt(oIdx);
                });
            });
        }

        loadQuestions();

        function submitQuiz() {
            if (Object.keys(answers).length < quizData.length) {
                alert('Please answer all questions before submitting! (' +
                    Object.keys(answers).length + '/10 answered)');
                return;
            }

            fetch('/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ answers })
            })
                .then(res => res.json())
                .then(data => showResults(data))
                .catch(err => console.error('Error:', err));
        }

        function showResults(data) {
            document.getElementById('quiz-form').style.display = 'none';
            document.getElementById('results').style.display = 'block';

            document.getElementById('score').textContent = data.score + '/' + data.total;

            let percentage = data.percentage;
            let text = percentage >= 80 ? 'Excellent! 🎉'
                : percentage >= 60 ? 'Good job! 👍'
                : percentage >= 40 ? 'Keep practicing! 💪'
                : 'Try again! 📚';

            document.getElementById('score-text').textContent = text;

            let html = '';
            data.results.forEach((result, idx) => {
                html += `
                    <div class="result-item">
                        <span class="badge ${result.is_correct ? 'correct' : 'incorrect'}">
                            ${result.is_correct ? '✓ Correct' : '✗ Incorrect'}
                        </span>
                        <div class="result-question">${idx + 1}. ${result.question}</div>
                        <div class="answer ${result.is_correct ? 'correct' : 'incorrect'}">
                            Your answer: ${result.user_answer}
                        </div>
                        ${!result.is_correct
                            ? `<div class="answer correct">Correct answer: ${result.correct_answer}</div>`
                            : ''}
                        <div class="explanation">💡 ${result.explanation}</div>
                    </div>`;
            });

            document.getElementById('result-details').innerHTML = html;
        }

        function restartQuiz() {
            answers = {};
            document.getElementById('quiz-form').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            loadQuestions();
        }
    </script>
</body>
</html>
