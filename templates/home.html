<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI & CS Quiz Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 50px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .logo { font-size: 80px; margin-bottom: 20px; }
        h1 { color: #333; font-size: 36px; margin-bottom: 15px; font-weight: 700; }
        .subtitle { color: #666; font-size: 18px; margin-bottom: 40px; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
        }
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🧠</div>
        <h1>AI & Computer Science Quiz</h1>
        <p class="subtitle">Test your knowledge on AI and tech developments from 2024–2026</p>
        <a href="/quiz" class="btn">Start Quiz →</a>
    </div>
</body>
</html>
